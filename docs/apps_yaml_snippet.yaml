ev_trip_logger:
  module: ev_trip_logger
  class: EVTripLogger
  log_file: /config/ev_trips/trips.json

ev_model_updater:
  module: model_updater
  class: EVModelUpdater
  trips_file: /config/ev_trips/trips.json
  model_file: /config/ev_trips/consumption_model.json
  min_trips_per_profile: 5
  learning_alpha: 0.15

ev_predictor:
  module: predictor
  class: EVPredictor
  model_file: /config/ev_trips/consumption_model.json
  min_soc_threshold: 20
  safety_buffer_soc: 5
  # Preheat reserve is calculated dynamically from forecast temperature —
  # no manual configuration needed. The formula (PREHEAT_SOC_PER_DEGREE = 0.15)
  # estimates SOC per °C of cabin warming needed and can be tuned in predictor.py.
  # Example reserves: 0°C -> 3%, -5°C -> 4%, -10°C -> 4%, -20°C -> 6%
  # Note: Python banker's rounding applies (round(4.5) = 4, not 5).
